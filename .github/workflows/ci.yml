name: CI

on:
  push:
    branches: [main]
    # Tag pushes (v*) trigger the release job, which attaches the prebuilt
    # web client dist to a GitHub Release so consumers can run it without
    # building from source.
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Tauri Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --locked
      - run: cargo test --workspace --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check (excludes tests/ fixtures, which are protected acceptance oracles)
        run: |
          find . -name '*.rs' -not -path './target/*' -not -path '*/tests/*' \
            -not -path './docs/audit/findings.rs' \
            -print0 | xargs -0 rustfmt --check --edition 2021
      - name: cargo clippy (excludes integration tests/, which are protected acceptance oracles)
        run: cargo clippy --workspace --lib --bins --examples --all-features --locked -- -D warnings

  wasm-target:
    name: wasm32 target build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p wasm-bindings --target wasm32-unknown-unknown --locked

  web-client:
    name: web client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - run: npm ci
      - name: npm audit high/critical
        run: |
          npm audit --audit-level=high --production
      - run: npm test

  web-artifact:
    name: web client build artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - run: npm ci
      # `npm run build` chains prepare-wasm (wasm-pack build) -> vite build,
      # producing a self-contained static bundle in clients/web/dist
      # (index.html + JS + CSS + the .wasm binary + fonts). No relay URL is
      # baked in: VITE_RELAY_WS_URL is left unset so consumers point the
      # artifact at any relay via localStorage["relayWsUrl"] at runtime.
      - run: npm run build
      - name: Upload web client dist
        uses: actions/upload-artifact@v4
        with:
          name: web-client-dist
          path: clients/web/dist
          if-no-files-found: error

  release:
    name: release web client artifact
    # Only on version tags (v*). The push trigger above includes tags: ['v*'].
    if: startsWith(github.ref, 'refs/tags/')
    needs: web-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: web-client-dist
          path: web-client-dist
      - name: Zip dist
        run: zip -r web-client-dist.zip web-client-dist
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-client-dist.zip
